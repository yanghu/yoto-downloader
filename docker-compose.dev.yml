services:
  yoto-api:
    build: ./app
    container_name: yoto_downloader_dev
    ports:
      - "8000:8000"
    volumes:
      # Downloads stored locally under the repo so they survive restarts
      - ./downloads:/downloads
      # Mount source code so uvicorn --reload picks up changes without rebuilding
      - ./app:/app
    environment:
      - TZ=America/Los_Angeles
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    # --reload watches /app for changes and restarts automatically
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
