name: CI / CD

on:
  push:
  pull_request:

jobs:
  # -------------------------------------------------------------------------
  # CI: run unit tests on every push and pull request
  # -------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/ -m "not smoke" -v

  # -------------------------------------------------------------------------
  # CD: build and push Docker image to Docker Hub
  #   - only runs on push to main (not on PRs or other branches)
  #   - only runs if the test job above passes
  # -------------------------------------------------------------------------
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates two tags:
      #   yang517/yoto-downloader:latest
      #   yang517/yoto-downloader:<short-sha>  (e.g. a1b2c3d)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yang517/yoto-downloader
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
